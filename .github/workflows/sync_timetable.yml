name: Sync Timetable

# GitHub Actions cron does not support day-of-week filtering natively in a
# way that prevents the job from being scheduled, so we use a weekday check
# inside each job instead (see the `if:` conditions below).

on:
  schedule:
    # Run every 15 minutes from 06:00–17:45 UTC (08:00–19:45 Paris CEST)
    # Covers all class boundaries (:00, :15, :30). Even with GitHub's runner
    # delay the result is accurate because we check the current state and
    # classes last at least 30 min.
    # Starts at 06:00 UTC (not 05:00) to avoid racing with the reset job.
    - cron: "*/15 6-17 * * *"
    # 05:00 UTC = 07:00 Paris time (CEST) — daily reset before classes start
    - cron: "0 5 * * *"
  workflow_dispatch: # Allow manual trigger from the GitHub UI
    inputs:
      action:
        description: 'Action à effectuer'
        required: true
        default: 'sync'
        type: choice
        options:
          - sync
          - reset
          - both

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Timetable sync — runs every hour at :55, Monday–Friday only ────────────
  sync:
    name: Fetch iCal and update Firestore
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Triggered by schedule OR manual choice (sync/both)
    if: |
      github.event.schedule == '*/15 6-17 * * *' || 
      (github.event_name == 'workflow_dispatch' && (inputs.action == 'sync' || inputs.action == 'both'))

    steps:
      - name: Check day of week
        id: dow
        # date +%u: 1=Mon … 5=Fri, 6=Sat, 7=Sun
        run: |
          DOW=$(date +%u)
          echo "DOW=$DOW"
          if [ "$DOW" -le 5 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Weekend — skipping timetable sync."
          fi

      - name: Checkout code
        if: steps.dow.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.dow.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        if: steps.dow.outputs.should_run == 'true'
        run: npm ci
        working-directory: scripts

      - name: Run timetable sync
        if: steps.dow.outputs.should_run == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node sync_timetable.js
        working-directory: scripts

  # ── Daily reset — runs at 05:00 UTC, Monday–Saturday ───────────────────────
  reset:
    name: Reset classrooms for the new day
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Triggered by schedule OR manual choice (reset/both)
    if: |
      github.event.schedule == '0 5 * * *' || 
      (github.event_name == 'workflow_dispatch' && (inputs.action == 'reset' || inputs.action == 'both'))

    steps:
      - name: Check day of week
        id: dow
        run: |
          DOW=$(date +%u)
          echo "DOW=$DOW"
          if [ "$DOW" -le 6 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Sunday — skipping daily reset."
          fi

      - name: Checkout code
        if: steps.dow.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.dow.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        if: steps.dow.outputs.should_run == 'true'
        run: npm ci
        working-directory: scripts

      - name: Reset all classrooms
        if: steps.dow.outputs.should_run == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node reset_classrooms.js
        working-directory: scripts

name: classroom_tracker
description: A new Flutter project for tracking classroom availability.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  provider: ^6.1.2
  intl: ^0.20.2
  path_provider: ^2.1.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
